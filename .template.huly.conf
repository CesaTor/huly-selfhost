HULY_VERSION=v0.7.426
DESKTOP_CHANNEL=0.7.426
DOCKER_NAME=${DOCKER_NAME}

# Host address — the URL users type in their browser (domain or IP:port)
HOST_ADDRESS=${HOST_ADDRESS}
SECURE=${SECURE}
HTTP_PORT=${HTTP_PORT}
HTTP_BIND=${HTTP_BIND}

# Huly
TITLE=${TITLE:-Huly}
DEFAULT_LANGUAGE=${DEFAULT_LANGUAGE:-en}
LAST_NAME_FIRST=${LAST_NAME_FIRST:-true}

# Secrets — auto-generated by setup.sh
SECRET=${HULY_SECRET}

# PostgreSQL
PG_USER=${PG_USER}
PG_DATABASE=${PG_DATABASE}
POSTGRES_PASSWORD=${PG_SECRET}
DATABASE_URL=postgres://${PG_USER}:${PG_SECRET}@postgres:5432/${PG_DATABASE}

# Redpanda
REDPANDA_ADMIN_USER=${REDPANDA_ADMIN_USER}
REDPANDA_ADMIN_PWD=${REDPANDA_SECRET}

# Docker volume paths — leave empty for named volumes
VOLUME_PG_DATA=${VOLUME_PG_DATA}
VOLUME_ELASTIC_PATH=${VOLUME_ELASTIC_PATH}
VOLUME_FILES_PATH=${VOLUME_FILES_PATH}
VOLUME_REDPANDA_PATH=${VOLUME_REDPANDA_PATH}

# Google OAuth (OpenID Connect) — for "Sign in with Google"
# 1. Create OAuth client at console.cloud.google.com → APIs & Services → Credentials
# 2. Set redirect URI to: http://localhost:8090/auth/openid/callback (adjust port)
# 3. Fill in values below and restart: docker compose up -d account
OPENID_CLIENT_ID=${OPENID_CLIENT_ID}
OPENID_CLIENT_SECRET=${OPENID_CLIENT_SECRET}
OPENID_ISSUER=${OPENID_ISSUER}

# SMTP
MAIL_SOURCE=${MAIL_SOURCE}
SMTP_HOST=${SMTP_HOST}
SMTP_PORT=${SMTP_PORT}
SMTP_USERNAME=${SMTP_USERNAME}
SMTP_PASSWORD=${SMTP_PASSWORD}
