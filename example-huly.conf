HULY_VERSION=v0.7.426
DESKTOP_CHANNEL=0.7.426
DOCKER_NAME=huly

# Host address — the URL users type in their browser (domain or IP:port)
HOST_ADDRESS=localhost:8080
HTTP_PORT=8080
HTTP_BIND=

# Set to 'true' to enable SSL (HTTPS/WSS)
SECURE=

# Huly
TITLE=Huly
DEFAULT_LANGUAGE=en
LAST_NAME_FIRST=true

# Secrets — auto-generated by setup.sh. Run with --secret to regenerate.
SECRET=example_secret_key_here

# PostgreSQL
PG_USER=selfhost
PG_PASSWORD=changeme
PG_DATABASE=huly
POSTGRES_PASSWORD=${PG_PASSWORD}
DATABASE_URL=postgres://${PG_USER}:${PG_PASSWORD}@postgres:5432/${PG_DATABASE}

# Redpanda
REDPANDA_ADMIN_USER=superadmin
REDPANDA_ADMIN_PWD=changeme

# Docker volume paths — leave empty for named volumes
VOLUME_PG_DATA=
VOLUME_ELASTIC_PATH=
VOLUME_FILES_PATH=
VOLUME_REDPANDA_PATH=

# SMTP (optional, for mail service)
MAIL_SOURCE=noreply@example.com
SMTP_HOST=
SMTP_PORT=587
SMTP_USERNAME=
SMTP_PASSWORD=
